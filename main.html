<!DOCTYPE html>
<html lang="ja" data-theme="light">  <!-- 初期はlight -->
<head>
 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">　　　　<!-- 別の端末でも見やすくする -->
  <title>べいすど | Potofolio</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root [data-theme="light"] {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --muted: #8a847c;
      --line: #d6d0c8;
      --card: #edeae3;
    }

    :root [data-theme="dark"] {
      --bg: #000000;
      --ink: #ffffff;
      --muted: #8a847c;
      --line: #d6d0c8;
      --card: #edeae3;
    }

    /*ほぼほぼ必須のやつ*/

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }



    /* 固定ヘッダーにする場合（sticky or fixed） */
.fixed-header {
  position: sticky;          /* または fixed */
  top: 0;
  left: 0;
  width: 100%;
  height: 80px;              /* ヘッダーの高さ（自分で調整） */
  background: #333;
  color: white;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 2rem;
}

nav a {
  color: rgb(48, 48, 48);
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: #00ccff;
}

/* コンテンツがヘッダーに隠れないよう余白を確保（任意） */
section {
  padding-top: 100px;        /* ヘッダー高さ + 少し余裕 */
  min-height: 100vh;
}


/* ── HEADER ── */
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      padding: 3rem 4rem 2rem;
      border-bottom: 1px solid var(--line);
      animation: fadeDown 0.8s ease both;
    }







  </style>

</head>

<body>


<div class="toggle-wrap">
  <button class="toggle-btn" onclick="toggleTheme()">
    <span class="toggle-icon" id="toggleIcon">☀️</span>
    <span id="toggleLabel">light</span>
  </button>
</div>



  <header>

    <span class="site-label">Portfolio — 2026</span>
    <nav>
      <a href="#home">home</a>
      <a href="#works">works</a>
      <a href="#about">about</a>
    </nav>





  </header>

  

  <footer>
    <p>© 2026 based.</p>
    <p>@copyright</p>
  </footer>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('toggleIcon').textContent = isDark ? '🌙' : '☀️';
    document.getElementById('toggleLabel').textContent = isDark ? 'dark' : 'light';
  }
</script>



  </body>

</html>
